{{ define "main" }}
<div class="page-header">
  <div class="container">
    <span class="section-label">{{ .Section | title }}</span>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
  </div>
</div>

<section class="page-content">
  <div class="container">
    <div class="content-body">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
