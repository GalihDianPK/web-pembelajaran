{{ define "main" }}
<div class="page-header">
  <div class="container">
    <span class="section-label">🏅 Sertifikasi LSP</span>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
  </div>
</div>

<section class="page-content">
  <div class="container">
    <div class="content-body">
      {{ .Content }}
    </div>
    <div style="margin-top:2rem;">
      <a href="/lsp/" class="btn btn-secondary">← Kembali ke Info LSP</a>
    </div>
  </div>
</section>
{{ end }}
