{{ define "main" }}
<!-- ESC Full-Screen Hero -->
<section class="esc-hero">
  <!-- Floating Particles -->
  <div class="esc-particles" id="esc-particles"></div>

  <!-- Mascot as large background element behind text -->
  <div class="esc-mascot-bg">
    <img src="{{ .Site.Params.mascot }}" alt="Maskot ESC">
  </div>

  <div class="esc-hero-content">
    <h1 class="fade-in delay-1"><span class="neon">Embedded System</span><br>Competition 2025</h1>
    <p class="subtitle fade-in delay-2">Kompetisi embedded system tahunan oleh {{ .Site.Params.labFullName }} {{ .Site.Params.university }}. Tunjukkan inovasimu!</p>
    <div class="fade-in delay-3" style="display:flex;justify-content:center;margin-top:2rem;">
      <a href="{{ .Params.daftar_link | default "#" }}" class="btn btn-primary" style="padding: 1rem 2.5rem; font-size: 1.1rem; border-radius: 50px; font-weight: 800; text-transform: uppercase; box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);" {{ if .Params.daftar_link }}target="_blank" rel="noopener"{{ end }}>Daftar di Sini</a>
    </div>
  </div>
</section>

<!-- ESC Content Section -->
<section class="section">
  <div class="container">
    <div class="content-body" style="max-width:900px;margin:0 auto;">
      {{ .Content }}
    </div>

    <!-- Interactive Competition Categories -->
    <div class="esc-categories fade-in">
      {{ range .Params.categories }}
      <div class="cat-card" style="background-image: url('{{ .image }}');">
        <div class="cat-content">
          <h3>{{ .name }}</h3>
          <p>{{ .desc }}</p>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>

<script>
  // Generate floating particles for ESC hero
  (function() {
    const container = document.getElementById('esc-particles');
    if (!container) return;
    const colors = ['#39FF14', '#8B5CF6', '#3B82F6', '#06B6D4'];
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'esc-particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.width = (Math.random() * 4 + 2) + 'px';
      particle.style.height = particle.style.width;
      const color = colors[Math.floor(Math.random() * colors.length)];
      particle.style.background = color;
      particle.style.boxShadow = `0 0 8px ${color}`;
      container.appendChild(particle);
    }
  })();

  // 3D Parallax Mascot Effect
  document.addEventListener('mousemove', function(e) {
    const mascot = document.querySelector('.esc-mascot-bg img');
    if (!mascot) return;
    
    // Calculate mouse position relative to center of screen
    const x = (window.innerWidth / 2 - e.pageX) / 40;
    const y = (window.innerHeight / 2 - e.pageY) / 40;
    
    // Apply transform (adding rotation for extra depth)
    mascot.style.transform = `translateX(${x}px) translateY(${y}px) rotateY(${x/2}deg) rotateX(${-y/2}deg)`;
  });

  window.addEventListener('scroll', function() {
    // Scroll parallax effect removed per request
  });

  // Mobile tap-to-expand for ESC category cards
  (function() {
    if (window.innerWidth > 768) return;
    const cards = document.querySelectorAll('.cat-card');
    cards.forEach(function(card) {
      card.addEventListener('click', function() {
        const isActive = this.classList.contains('mobile-active');
        // Close all cards first
        cards.forEach(function(c) { c.classList.remove('mobile-active'); });
        // Toggle the tapped card
        if (!isActive) {
          this.classList.add('mobile-active');
        }
      });
    });
  })();
</script>
{{ end }}
